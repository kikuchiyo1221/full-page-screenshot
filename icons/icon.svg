<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="24" y="44" width="80" height="56" rx="8" fill="#fff"/>
  <!-- Camera lens -->
  <circle cx="64" cy="72" r="20" fill="#1d4ed8"/>
  <circle cx="64" cy="72" r="14" fill="#3b82f6"/>
  <circle cx="64" cy="72" r="8" fill="#fff" opacity="0.3"/>
  <!-- Flash -->
  <rect x="76" y="50" width="20" height="8" rx="2" fill="#fbbf24"/>
  <!-- Viewfinder -->
  <rect x="32" y="50" width="12" height="8" rx="2" fill="#1d4ed8"/>
  <!-- Page indicator -->
  <rect x="84" y="80" width="16" height="12" rx="2" fill="#1d4ed8"/>
  <line x1="86" y1="84" x2="98" y2="84" stroke="#fff" stroke-width="2"/>
  <line x1="86" y1="88" x2="94" y2="88" stroke="#fff" stroke-width="2"/>
</svg>
