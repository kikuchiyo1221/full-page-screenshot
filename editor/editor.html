<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="editor.css">
  <title data-i18n="editorTitle">Edit Screenshot</title>
</head>
<body>
  <div class="editor-container">
    <!-- Toolbar -->
    <header class="editor-toolbar">
      <div class="toolbar-left">
        <div class="tool-group">
          <button class="tool-btn" data-tool="arrow" title="Arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
            <span data-i18n="toolArrow">Arrow</span>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            </svg>
            <span data-i18n="toolRect">Rectangle</span>
          </button>
          <button class="tool-btn" data-tool="circle" title="Circle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
            </svg>
            <span data-i18n="toolCircle">Circle</span>
          </button>
          <button class="tool-btn" data-tool="text" title="Text">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 7 4 4 20 4 20 7"></polyline>
              <line x1="9" y1="20" x2="15" y2="20"></line>
              <line x1="12" y1="4" x2="12" y2="20"></line>
            </svg>
            <span data-i18n="toolText">Text</span>
          </button>
          <button class="tool-btn" data-tool="marker" title="Marker">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
              <path d="M2 2l7.586 7.586"></path>
            </svg>
            <span data-i18n="toolMarker">Marker</span>
          </button>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-group">
          <div class="color-picker-wrapper">
            <input type="color" id="color-picker" value="#ff0000" title="Color">
            <div class="color-preview" id="color-preview"></div>
          </div>
          <input type="range" id="stroke-width" min="1" max="20" value="3" class="stroke-slider" title="Stroke Width">
          <span id="stroke-value" class="stroke-value">3px</span>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-group">
          <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 7v6h6"></path>
              <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
            </svg>
          </button>
          <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 7v6h-6"></path>
              <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path>
            </svg>
          </button>
          <button class="tool-btn danger" id="btn-clear" title="Clear All">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="toolbar-right">
        <div class="format-select-wrapper">
          <select id="format-select" class="format-select">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="pdf">PDF</option>
          </select>
        </div>
        <button class="action-btn secondary" id="btn-copy" data-i18n="btnCopy">
          Copy
        </button>
        <button class="action-btn primary" id="btn-save" data-i18n="btnDownload">
          Save
        </button>
        <button class="action-btn text" id="btn-cancel" data-i18n="btnCancel">
          Cancel
        </button>
      </div>
    </header>

    <!-- Canvas Area -->
    <main class="editor-canvas-wrapper">
      <div class="canvas-container" id="canvas-container">
        <canvas id="background-canvas"></canvas>
        <canvas id="drawing-canvas"></canvas>
      </div>
    </main>

    <!-- Text Input Modal -->
    <div class="text-modal hidden" id="text-modal">
      <div class="text-modal-content">
        <textarea id="text-input" placeholder="Enter text..." rows="3"></textarea>
        <div class="text-modal-actions">
          <button class="action-btn secondary" id="text-cancel">Cancel</button>
          <button class="action-btn primary" id="text-confirm">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
